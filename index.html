<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currículo - Karolina Anjos</title>
  <style>
    body {
      background-color: #121212;
      /* Estética Dark */
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    /* Requisito: Alinhamento Horizontal Centralizado */
    header,
    section {
      text-align: center;
      width: 100%;
      max-width: 600px;
    }

    h1 {
      color: #ff3333;
      margin-bottom: 5px;
    }

    h3 {
      color: #bbbbbb;
      font-weight: 300;
      margin-top: 0;
    }

    /* Requisito: Foto Arredondada */
    .foto-arredondada {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      /* Faz o círculo perfeito */
      border: 4px solid #ff3333;
      /* Borda vermelha temática */
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(255, 51, 51, 0.4);
    }

    .container-video {
      margin-top: 30px;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #333;
    }

    iframe {
      border-radius: 8px;
      max-width: 100%;
    }

    hr {
      width: 50%;
      border: 1px solid #333;
      margin: 20px 0;
    }
  </style>
</head>

<body>

  <header>
    <img src="https://i.pinimg.com/736x/5d/eb/4f/5deb4f224ed52b7ae2e7f032d7329fe5.jpg" alt="Foto de Perfil" class="foto-arredondada">
    <h1>Karolina Anjos</h1>
    <h3>Estudante de ADS & Ciência da Computação</h3>
  </header>

  <hr>

  <section>
    <h2>Objetivo Profissional</h2>
    <p>Desenvolvedora Front-End em formação, focada em criar interfaces modernas e funcionais.</p>

    <div class="container-video">
      <h2>Vídeo em Destaque: One Punch-Man</h2>
      <iframe width="560" height="315" src="https://www.youtube.com/embed/1Kys9jSLx4Q?si=Zpk9ePTf5VMbLU1W" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
  </section>

</body>

</html>
